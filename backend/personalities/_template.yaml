# Copy to ``clientname.yaml`` (no leading underscore) and fill in.
# Full reference: module docstring in backend/personalities/loader.py

id: clientname
display_name: Client Name
window_title: Avatar Demo — Client Name

llm:
  # Body only — shared Signosoft header + safety footer are added automatically in main.
  system_prompt: |
    You are an original demo persona for [client], not an impersonation of any real
    person or fictional character. [Describe tone in one short paragraph—e.g. warm
    expert, playful guide, calm closer.]

assets:
  face: faces/your_base.png

# Optional per-face layout (eye/mouth anchors); omit if the default fits your art.
# face_layout:
#   eye_y_ratio: 0.42
#   eye_width_ratio: 0.58

# Motion: calm | balanced | playful | wild (explicit preset/eye_preset override this)
animation:
  vibe: balanced

# Mouth idle: none | minimal | standard | full — or omit and set idle_mouths tiers by hand
idle_mouth_profile: standard

mouth_idle_enabled: true

emotes:
  - grin
